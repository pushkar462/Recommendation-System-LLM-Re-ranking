# Render Blueprint — https://render.com/docs/blueprint-spec
# Free tier (~512Mi): ml-1m OOMs — use synthetic + keyword rerank + fewer epochs.
# For real MovieLens: upgrade to Starter+ and set DATASET_VARIANT=ml-1m, SAMPLE_USERS=300.

services:
  - type: web
    name: recsys-llm-rerank
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATASET_VARIANT
        value: "synthetic"
      - key: RERANKER_USE_KEYWORDS_ONLY
        value: "1"
      - key: TWO_TOWER_EPOCHS
        value: "8"
      - key: RERANKER_EPOCHS
        value: "2"
